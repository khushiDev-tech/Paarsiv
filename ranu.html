<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Industry Solutions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  font-family: "Nunito", sans-serif;
  background: #f7f7f7;
}

/* LEFT FIXED */
.left-sticky {
  position: sticky;
  top: 80px;
}

/* VIEWPORT */
.viewport {
  height: 420px;
  overflow: hidden;
}

/* TRACK */
.track {
  display: flex;
  flex-direction: column;
  transition: transform 0.6s ease;
}

/* PAGE */
.page {
  min-height: 420px;
  display: flex;
  align-items: center;
}

/* CARD */
.solution-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid #8db2a5;
  transition: 0.3s;
  height: 100%;
}

.solution-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* ICON */
.icon-box {
  width: 50px;
  height: 50px;
  background: #eef3fa;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
}

.icon-box i {
  color: #5bb596;
}

.card-title {
  font-weight: 600;
}

.card-text {
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>

<section class="container py-5">

<div class="row g-5">

<!-- LEFT -->
<div class="col-lg-6 left-sticky">
  <h2>Trusted by Customers</h2>
  <p>Scroll right side to see services</p>
</div>

<!-- RIGHT -->
<div class="col-lg-6">

<div class="viewport" id="vp">
<div class="track" id="track">

<!-- PAGE 1 -->
<div class="page">
<div class="row g-4">

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-brands fa-salesforce"></i></div>
<div class="card-title">Salesforce</div>
<div class="card-text">CRM customization</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-chart-line"></i></div>
<div class="card-title">Analytics</div>
<div class="card-text">Business insights</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-globe"></i></div>
<div class="card-title">Digital</div>
<div class="card-text">Transformation</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-cloud"></i></div>
<div class="card-title">Cloud</div>
<div class="card-text">Infrastructure</div>
</div>
</div>

</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="row g-4">

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-code"></i></div>
<div class="card-title">Web Dev</div>
<div class="card-text">Fast websites</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-rocket"></i></div>
<div class="card-title">Growth</div>
<div class="card-text">Marketing</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-mobile-screen"></i></div>
<div class="card-title">Mobile</div>
<div class="card-text">Apps</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-robot"></i></div>
<div class="card-title">AI</div>
<div class="card-text">Automation</div>
</div>
</div>

</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<div class="row g-4">

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-shield"></i></div>
<div class="card-title">Security</div>
<div class="card-text">Protection</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-database"></i></div>
<div class="card-title">Database</div>
<div class="card-text">Storage</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-network-wired"></i></div>
<div class="card-title">Consulting</div>
<div class="card-text">Strategy</div>
</div>
</div>

<div class="col-md-6">
<div class="solution-card">
<div class="icon-box"><i class="fa-solid fa-headset"></i></div>
<div class="card-title">Support</div>
<div class="card-text">24/7 help</div>
</div>
</div>

</div>
</div>

</div>
</div>

</div>
</div>

</section>

<script>
let current = 0;
let isAnimating = false;

const track = document.getElementById("track");
const pages = document.querySelectorAll(".page");
const vp = document.getElementById("vp");

function goToPage(index) {
  if (index < 0 || index >= pages.length || isAnimating) return;

  isAnimating = true;
  current = index;

  track.style.transform = `translateY(-${index * 100}%)`;

  setTimeout(() => {
    isAnimating = false;
  }, 600);
}

vp.addEventListener("wheel", (e) => {

  if (isAnimating) return;

  if (e.deltaY > 0) {
    if (current < pages.length - 1) {
      e.preventDefault();
      goToPage(current + 1);
    }
  } else {
    if (current > 0) {
      e.preventDefault();
      goToPage(current - 1);
    }
  }

}, { passive: false });
</script>

</body>
</html>
