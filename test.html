<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Logo Slider</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>

.technology {
  padding: 60px 0;
  background: #f5f5f5;
  overflow: hidden;
}

.slider {
  overflow: hidden;
  margin-bottom: 30px;
}

.track {
  display: flex;
  gap: 40px;
  width: max-content;
  animation: scroll 25s linear infinite;
}

.slider.reverse .track {
  animation-direction: reverse;
}

.item {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: max-content;
}

.logo {
  width: 60px;
  height: 60px;
  border-radius: 18px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo img {
  width: 34px;
  height: auto;
}

.item h3 {
  font-size: 24px;
  font-weight: 600;
  color: #111;
  margin: 0;
}

/* animation */
@keyframes scroll {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-50%);
  }
}
  </style>
</head>
<body>
    <section class="technology">

  <!-- ROW 1 -->
  <div class="slider">
    <div class="track">

      <div class="item">
        <div class="logo"><img src="static/images/html.webp"></div>
        <h3>HTML</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/CSS3.png"></div>
        <h3>CSS</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/JavaScript-logo.png"></div>
        <h3>JavaScript</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/bootstrap.png"></div>
        <h3>Bootstrap</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/tailwind.webp"></div>
        <h3>Tailwind</h3>
      </div>

      <!-- duplicate -->
      <div class="item">
        <div class="logo"><img src="static/images/html.webp"></div>
        <h3>HTML</h3>
      </div>

    </div>
  </div>

  <!-- ROW 2 -->
  <div class="slider reverse">
    <div class="track">

      <div class="item">
        <div class="logo"><img src="static/images/react.png"></div>
        <h3>React</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/nodejs.png"></div>
        <h3>Node JS</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/mysql.png"></div>
        <h3>MySQL</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/github.jpg"></div>
        <h3>GitHub</h3>
      </div>

      <div class="item">
        <div class="logo"><img src="static/images/dataCloud.png"></div>
        <h3>Data Cloud</h3>
      </div>

      <!-- duplicate -->
      <div class="item">
        <div class="logo"><img src="static/images/react.png"></div>
        <h3>React</h3>
      </div>

    </div>
  </div>

</section>

</body>
</html>
